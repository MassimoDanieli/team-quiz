# Team Quiz — docker-compose deployment
#
# Base (default profile): the app on :3000, state persisted to a named volume.
#   docker compose up -d
#
# With TLS (proxy profile): Caddy terminates HTTPS in front of the app and
# obtains/renews a Let's Encrypt certificate automatically.
#   docker compose --profile proxy up -d
#
# Config comes from a .env file next to this one (see .env.example).

services:
  app:
    build: .
    image: team-quiz:1.11.0
    container_name: team-quiz
    restart: unless-stopped

    environment:
      PORT: "3000"
      WIN_SCORE: "${WIN_SCORE:-3}"
      TIMER_SECONDS: "${TIMER_SECONDS:-60}"
      MAX_PLAYERS: "${MAX_PLAYERS:-200}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # DATA_FILE and ADMINS_FILE are already set in the image (both under /data);
      # they are repeated here only to make the persistence explicit.
      DATA_FILE: /data/state.json
      ADMINS_FILE: /data/admins.json
      # Secrets — supplied via .env, never hard-coded here.
      SHARED_PASSWORD: "${SHARED_PASSWORD:-}"
      SUPER_ADMIN_USER: "${SUPER_ADMIN_USER:-superadmin}"
      SUPER_ADMIN_PASSWORD: "${SUPER_ADMIN_PASSWORD:-}"

    # Bind to localhost by default and put a proxy in front. With --profile proxy,
    # Caddy reaches the app over the internal network; comment this block out then.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:3000:3000"

    volumes:
      - quiz-data:/data

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # --- Hardening (consistent with the security review) ---
    # The image already runs as the non-root "node" user (uid 1000).
    read_only: true              # rootfs immutable; the app only writes to /data
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - quiznet

  # ---- Optional reverse proxy with automatic HTTPS ----
  # Enabled only with:  docker compose --profile proxy up -d
  caddy:
    image: caddy:2-alpine
    container_name: team-quiz-caddy
    restart: unless-stopped
    profiles: ["proxy"]
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      QUIZ_DOMAIN: "${QUIZ_DOMAIN:-quiz.example.com}"
      # Non-empty default: an empty value would make the Caddyfile's global
      # `email {$TLS_EMAIL}` directive fail to parse. Set a real address in
      # .env to receive Let's Encrypt expiry/renewal notices.
      TLS_EMAIL: "${TLS_EMAIL:-admin@example.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - quiznet

networks:
  quiznet:
    driver: bridge

volumes:
  quiz-data:
  caddy-data:
  caddy-config:
