apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "team-quiz.fullname" . }}
  labels:
    {{- include "team-quiz.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # RWO EBS volume + single replica: Recreate avoids two pods contending for the
  # same volume during an upgrade (RollingUpdate would deadlock on attach).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "team-quiz.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "team-quiz.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "team-quiz.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: team-quiz
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: {{ include "team-quiz.fullname" . }}
          env:
            - name: SHARED_PASSWORD
              valueFrom:
                secretKeyRef:
                  {{- if .Values.app.existingSecret }}
                  name: {{ .Values.app.existingSecret }}
                  key: {{ .Values.app.existingSecretKey }}
                  {{- else }}
                  name: {{ include "team-quiz.fullname" . }}
                  key: shared-password
                  {{- end }}
                  optional: true
          readinessProbe:
            httpGet:
              path: /config
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /config
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "team-quiz.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
